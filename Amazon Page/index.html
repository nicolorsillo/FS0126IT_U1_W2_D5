<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <meta name="description" content="Amazon page." />
    <title>Amazon</title>
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <header>
      <div id="top">
        <img src="./assets/images/logo.png" alt="amazon logo" />
      </div>
      <nav>
        <ul>
          <li><a href="#all">All</a></li>
          <li><a href="#today-s-deals">Today's deals</a></li>
          <li><a href="#customer-service">Customer Service</a></li>
          <li><a href="#registry">Registry</a></li>
          <li><a href="#gift-card">Gift Cards</a></li>
          <li><a href="#sell">Sell</a></li>
        </ul>
      </nav>
      <div>
        <p>Shop All Holiday Gift Cards</p>
      </div>
    </header>
    <main>
      <section>
        <h1>Holiday Gift Guides</h1>
        <p>Be a go-gifter</p>
      </section>
      <section>
        <div>
          <h2>Find the perfect gift</h2>
          <a href="#shop-now">Shop now</a>
        </div>
        <div>
          <img src="./assets/images/img_1.jpg" alt="Kindle image" />
          <img src="./assets/images/img_2.jpg" alt="Laptop image" />
          <img src="./assets/images/img_3.jpg" alt="Smartwatch image" />
          <img src="./assets/images/img_4.jpg" alt="Pets image" />
        </div>
      </section>
      <section>
        <figure>
          <img src="./assets/images/img_9.png" alt="VR Visor image" />
          <figcaption>
            <p>Play the gifting game</p>
            <a href="#shop-gaming">Shop gaming</a>
          </figcaption>
        </figure>
      </section>
      <section>
        <figure>
          <img
            src="./assets/images/img_10.png"
            alt="Headphones and bluethooth speaker image"
          />
          <figcaption>
            <p>The sound of cheer</p>
            <a href="#shop-audio">Shop Audio & Accessories</a>
          </figcaption>
        </figure>
      </section>
    </main>
    <footer>
      <div>
        <a href="#top">Back to top</a>
      </div>
      <div>
        <img src="./assets/images/logo.png" alt="amazon logo" />
      </div>
    </footer>
  </body>
</html>
